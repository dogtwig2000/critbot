<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CritBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:dark;
    --ink:#16130F;
    --surface:#211C16;
    --surface-2:#2A241D;
    --haze:#9A9088;
    --paper:#F2ECE1;
    --accent:#7C8576;            /* set per persona */
    --accent-soft:rgba(124,133,118,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{background:var(--ink)}
  html,body{height:100%;min-height:100dvh}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',system-ui,sans-serif;
    display:flex;justify-content:center;
    overflow:hidden;
    transition:background .6s ease;
  }
  /* ambient temperature shift toward the active persona */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(120% 80% at 50% 8%, var(--accent-soft), transparent 60%);
    transition:background .6s ease;
  }
  .stage{
    position:relative;z-index:1;
    width:100%;max-width:440px;height:100dvh;
    display:flex;flex-direction:column;
    padding:max(64px,calc(env(safe-area-inset-top) + 28px)) 18px 22px;
  }
  .descriptor{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--accent);font-weight:600;
    min-height:14px;text-align:center;transition:color .6s ease;
  }
  .frame{
    position:relative;margin-top:12px;
    width:100%;aspect-ratio:4/5;
    border-radius:18px;overflow:hidden;
    background:#000;
    box-shadow:0 1px 0 rgba(255,255,255,.04), 0 24px 60px rgba(0,0,0,.5);
  }
  video,canvas,#shot{width:100%;height:100%;object-fit:cover;display:block}
  #shot{display:none}
  canvas{display:none}
  .frame.frozen video{display:none}
  .frame.frozen #shot{display:block}
  /* viewfinder ticks */
  .ticks{position:absolute;inset:0;pointer-events:none;opacity:.55;transition:opacity .4s}
  .frame.frozen .ticks{opacity:0}
  .ticks span{position:absolute;width:18px;height:18px;border:2px solid rgba(242,236,225,.8)}
  .ticks .tl{top:14px;left:14px;border-right:0;border-bottom:0}
  .ticks .tr{top:14px;right:14px;border-left:0;border-bottom:0}
  .ticks .bl{bottom:14px;left:14px;border-right:0;border-top:0}
  .ticks .br{bottom:14px;right:14px;border-left:0;border-top:0}

  .snap{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    width:66px;height:66px;border-radius:50%;
    border:4px solid rgba(242,236,225,.9);background:rgba(242,236,225,.16);
    backdrop-filter:blur(2px);cursor:pointer;transition:transform .12s, opacity .3s;
  }
  .snap:active{transform:translateX(-50%) scale(.92)}
  .frame.frozen .snap{display:none}

  /* the spoken line */
  .cardwrap{
    display:flex;flex-direction:column;align-items:center;
    gap:8px;margin-top:12px;
  }
  .card{
    width:100%;border-radius:12px;padding:12px 16px;
    min-height:48px;max-height:108px;overflow-y:auto;text-align:center;
    background:#0E0C09;border:1px solid rgba(242,236,225,.10);
    box-shadow:0 8px 22px rgba(0,0,0,.35);
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .card::-webkit-scrollbar{display:none}
  .line{
    font-family:'Fraunces',Georgia,serif;
    font-size:clamp(16px,4.3vw,19px);line-height:1.4;
    font-weight:400;color:var(--paper);
  }
  .line .w{opacity:0;transition:opacity .15s ease}
  .line .w.on{opacity:1}
  .line.monkey{font-style:italic;opacity:.94}
  .line.fan .pro{font-style:italic}
  .placeholder{color:var(--haze);font-family:'Inter',sans-serif;font-size:14px;font-style:normal}
  .thinking{color:var(--accent);font-family:'Inter',sans-serif;font-size:14px;letter-spacing:.04em}

  /* persona dial */
  .dial{display:flex;gap:10px;justify-content:center;margin-top:auto;padding-top:14px}
  .persona{
    flex:1;max-width:108px;height:74px;border-radius:16px;
    background:var(--surface);border:1px solid rgba(242,236,225,.07);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    cursor:pointer;font-family:'Inter';color:var(--haze);
    transition:transform .12s, border-color .3s, background .3s, color .3s;
  }
  .persona:disabled{opacity:.4;cursor:default}
  .persona .ico{font-size:26px;line-height:1}
  .persona .nm{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .persona[aria-pressed="true"]{
    background:var(--surface-2);color:var(--paper);
    border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), 0 0 24px var(--accent-soft);
  }
  .persona:not(:disabled):active{transform:scale(.95)}

  .topbar{display:flex;align-items:center;justify-content:space-between;min-height:26px;line-height:1.4}
  .wordmark{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.01em}
  .wordmark .w1{color:var(--paper)}
  .wordmark .w2{color:var(--accent);transition:color .6s ease}
  .action{
    margin-top:14px;width:100%;height:56px;border:0;border-radius:16px;
    background:var(--accent);color:var(--on-accent,#16130F);cursor:pointer;
    font-family:'Inter';font-weight:600;font-size:15px;letter-spacing:.2em;text-transform:uppercase;
    transition:background .4s ease, color .4s ease, transform .12s, opacity .3s;
  }
  .action:disabled{opacity:.35;cursor:default;background:var(--surface-2);color:var(--haze)}
  .action:not(:disabled):active{transform:scale(.985)}
  .retake{
    margin-top:12px;align-self:center;background:none;border:0;
    color:var(--haze);font-family:'Inter';font-size:13px;letter-spacing:.04em;
    cursor:pointer;padding:8px 14px;text-decoration:underline;text-underline-offset:3px;
  }
  .retake[hidden]{display:none}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="stage">
    <div class="topbar"><div class="wordmark"><span class="w1">Crit</span><span class="w2">Bot</span></div></div>

    <div class="frame" id="frame">
      <video id="video" playsinline autoplay muted></video>
      <img id="shot" alt="your drawing">
      <canvas id="canvas"></canvas>
      <div class="ticks"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>
      <button class="snap" id="snap" aria-label="Snap a picture"></button>
    </div>

    <div class="cardwrap">
      <div class="card"><div class="line" id="line"><span class="placeholder">Snap your drawing, then pick a critic.</span></div></div>
      <div class="descriptor" id="descriptor"></div>
    </div>

    <div class="dial">
      <button class="persona" data-p="monkey" disabled><span class="ico">🐵</span><span class="nm">Monkey</span></button>
      <button class="persona" data-p="professor" disabled><span class="ico">👨🏻‍🎓</span><span class="nm">Professor</span></button>
      <button class="persona" data-p="fan" disabled><span class="ico">😃</span><span class="nm">Fan</span></button>
    </div>

    <button class="action" id="action" disabled>Crit</button>
    <button class="retake" id="retake" hidden>retake</button>
  </div>

<script>
const PERSONA = {
  monkey:    { accent:"#7C8576", soft:"rgba(124,133,118,.18)", on:"#16130F", eyebrow:"the voice in your head", rate:.82, pitch:.7  },
  professor: { accent:"#8C3A2E", soft:"rgba(140,58,46,.20)",   on:"#F2ECE1", eyebrow:"the art establishment",   rate:.94, pitch:.9  },
  fan:       { accent:"#E59B53", soft:"rgba(229,155,83,.22)",  on:"#16130F", eyebrow:"the one in your corner",   rate:1.0, pitch:1.18 },
};
const ACTION_LABEL="Crit";

const video=document.getElementById('video');
const shot=document.getElementById('shot');
const canvas=document.getElementById('canvas');
const frame=document.getElementById('frame');
const lineEl=document.getElementById('line');
const descriptor=document.getElementById('descriptor');
const retake=document.getElementById('retake');
const actionBtn=document.getElementById('action');
const personaBtns=[...document.querySelectorAll('.persona')];
const card=document.querySelector('.card');
let imageB64=null, active=null, ttsReady=false;

/* ---- camera ---- */
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
    video.srcObject=stream;
  }catch(e){
    // no camera (sandbox, denied, desktop) -> offer upload
    lineEl.innerHTML='<span class="placeholder">No camera here — tap the frame to upload a drawing.</span>';
    document.getElementById('snap').style.display='none';
    frame.style.cursor='pointer';
    frame.addEventListener('click',pickFile);
  }
}
function pickFile(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;
    const r=new FileReader();r.onload=()=>{ const img=new Image(); img.onload=()=>setShot(toJpeg(img,img.naturalWidth,img.naturalHeight)); img.src=r.result; };r.readAsDataURL(f);};
  inp.click();
}

function toJpeg(src,sw,sh){
  const max=1024;let w=sw,h=sh;
  if(Math.max(w,h)>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
  canvas.width=w;canvas.height=h;
  canvas.getContext('2d').drawImage(src,0,0,w,h);
  return canvas.toDataURL('image/jpeg',.82);
}

document.getElementById('snap').addEventListener('click',()=>{
  primeTTS();
  setShot(toJpeg(video,video.videoWidth,video.videoHeight));
});

function setShot(dataUrl){
  shot.src=dataUrl;
  imageB64=dataUrl.split(',')[1];
  frame.classList.add('frozen');
  retake.hidden=false;
  active=null;actionBtn.disabled=true;
  descriptor.textContent='';
  personaBtns.forEach(b=>{b.disabled=false;b.setAttribute('aria-pressed','false');});
  lineEl.className='line';
  lineEl.innerHTML='<span class="placeholder">Pick a critic.</span>';
}

retake.addEventListener('click',()=>{
  stopSpeak();
  frame.classList.remove('frozen');
  retake.hidden=true;imageB64=null;active=null;
  personaBtns.forEach(b=>{b.disabled=true;b.setAttribute('aria-pressed','false');});
  actionBtn.disabled=true;
  descriptor.textContent='';
  document.documentElement.style.setProperty('--accent','#7C8576');
  document.documentElement.style.setProperty('--accent-soft','rgba(124,133,118,.18)');
  document.documentElement.style.setProperty('--on-accent','#16130F');
  lineEl.className='line';
  lineEl.innerHTML='<span class="placeholder">Snap your drawing, then pick a critic.</span>';
});

/* ---- personas ---- */
personaBtns.forEach(b=>b.addEventListener('click',()=>{
  if(b.disabled)return;
  primeTTS();
  const p=b.dataset.p;
  active=p;
  personaBtns.forEach(x=>x.setAttribute('aria-pressed', x===b?'true':'false'));
  setAccent(p);
  descriptor.textContent=PERSONA[p].eyebrow;
  stopSpeak();
  actionBtn.disabled=false;
  lineEl.className='line';
  lineEl.innerHTML='<span class="placeholder">Tap '+ACTION_LABEL+'.</span>';
}));

actionBtn.addEventListener('click',()=>{
  if(actionBtn.disabled||!active)return;
  primeTTS();
  runCritic(active);
});

function setAccent(p){
  document.documentElement.style.setProperty('--accent',PERSONA[p].accent);
  document.documentElement.style.setProperty('--accent-soft',PERSONA[p].soft);
  document.documentElement.style.setProperty('--on-accent',PERSONA[p].on);
}

/* ---- the brain ---- */
const DEMO={
  monkey:"Well. You're certainly not an artist.",
  professor:"What we have here is, ostensibly, a drawing — though I'd resist the figurative reading and attend instead to the triangular armature implied by the negative space, which recalls, if distantly, early Balthus before his turn toward the —",
  fan:"Oh, I love this. There's so much life in that line — how did you even do that? You should keep it."
};

async function runCritic(p){
  stopSpeak();
  lineEl.className='line';
  lineEl.innerHTML='<span class="thinking">…</span>';
  let text=null, audio=null, alignment=null;
  try{
    const res=await fetch('/api/critic',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({persona:p,image:imageB64})
    });
    if(!res.ok) throw new Error('no brain');
    const data=await res.json();
    text=(data.text||'').trim();
    audio=data.audio||null;
    alignment=data.alignment||null;
  }catch(e){
    text=DEMO[p];
  }
  if(active!==p) return;
  renderWords(text,p);
  if(audio && actx){
    try{ await playMp3(audio, alignment); return; }catch(e){ console.warn('mp3 failed',e); }
  }
  speakFallback(text,p);
}

/* ---- audio + word reveal ---- */
let utter=null, actx=null, curSrc=null, rafId=null;
let spans=[], shown=0;

function primeTTS(){
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); }catch(e){}
  if(ttsReady||!window.speechSynthesis)return;
  try{const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);ttsReady=true;}catch(e){}
}

function stopSpeak(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  if(curSrc){try{curSrc.stop()}catch(e){} curSrc=null;}
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
}

function renderWords(text,p){
  lineEl.className='line '+p;
  const parts=text.split(/(\s+)/);
  lineEl.innerHTML=parts.map(w=>/\s+/.test(w)?w:`<span class="w">${w}</span>`).join('');
  spans=[...lineEl.querySelectorAll('.w')];
  shown=0;
  if(card) card.scrollTop=0;
}

// Build per-word start times from ElevenLabs character alignment
function buildWordTimings(text, alignment){
  if(!alignment) return null;
  const { characters, character_start_times_seconds } = alignment;
  const timings=[];
  let ci=0;
  for(const word of (text.match(/\S+/g)||[])){
    while(ci<characters.length && /\s/.test(characters[ci])) ci++;
    timings.push(character_start_times_seconds[ci]||0);
    ci+=word.length;
  }
  return timings;
}

// Reveal words via requestAnimationFrame synced to actx.currentTime
function startCaptionSync(wordTimings){
  const t0=actx.currentTime;
  let r=0;
  function frame(){
    const elapsed=actx.currentTime-t0;
    while(r<wordTimings.length && wordTimings[r]<=elapsed){
      if(spans[r]) { spans[r].classList.add('on'); if(card) card.scrollTop=card.scrollHeight; }
      r++;
    }
    if(r<wordTimings.length) rafId=requestAnimationFrame(frame);
    else{ spans.forEach(s=>s.classList.add('on')); rafId=null; }
  }
  rafId=requestAnimationFrame(frame);
}

// Timed fallback when no alignment data
function revealOver(ms){
  if(!spans.length)return;
  const step=Math.max(80,ms/spans.length);
  let t=0;
  const timer=setInterval(()=>{ if(spans[t]) spans[t].classList.add('on'); t++; if(t>=spans.length) clearInterval(timer); },step);
}

async function playMp3(b64, alignment){
  const bin=atob(b64), bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const buf=await actx.decodeAudioData(bytes.buffer);
  const src=actx.createBufferSource(); src.buffer=buf; src.connect(actx.destination);
  curSrc=src;
  src.start();
  const wordTimings=buildWordTimings(lineEl.textContent, alignment);
  if(wordTimings) startCaptionSync(wordTimings);
  else revealOver(buf.duration*1000);
  src.onended=()=>{ spans.forEach(s=>s.classList.add('on')); if(curSrc===src)curSrc=null; };
}

function pickVoice(p){
  if(!window.speechSynthesis)return null;
  const v=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(!v.length)return null;
  if(p==='fan')return v.find(x=>/female|samantha|victoria|karen|moira|tessa|zira/i.test(x.name))||v[0];
  if(p==='professor')return v.find(x=>/uk|british|daniel|arthur|george|oliver/i.test(x.name+x.lang))||v[0];
  return v.find(x=>/male|daniel|fred|alex/i.test(x.name))||v[0];
}
function speakFallback(text,p){
  if(!window.speechSynthesis){ revealOver(text.split(/\s+/).length*220); return; }
  const cfg=PERSONA[p];
  utter=new SpeechSynthesisUtterance(text);
  utter.rate=cfg.rate;utter.pitch=cfg.pitch;
  const v=pickVoice(p);if(v)utter.voice=v;
  const est=Math.max(120, 60000/(170*cfg.rate));
  revealOver(text.split(/\s+/).length*est);
  utter.onend=()=>{ spans.forEach(s=>s.classList.add('on')); };
  speechSynthesis.speak(utter);
}

actionBtn.textContent=ACTION_LABEL;
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>{};
startCamera();
</script>
</body>
</html>
